name: Deploy FastAPI Backend to AWS Lambda

# This tells GitHub to run the script ONLY if you push changes to the 'main' branch
# AND those changes are inside the 'backend' folder.
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # This is the magic line for monorepos! It tells GitHub to run all following commands inside the 'backend' folder.
    defaults:
      run:
        working-directory: ./backend 

    steps:
      # 1. Grab the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python (Match this to your Lambda's Python version)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies directly into the backend folder
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t .

      # 4. Zip everything up (excluding git, virtual env, and cache files)
      - name: Create Zip Archive
        run: |
          zip -r9 deployment_package.zip . -x "*.git*" "venv/*" "__pycache__/*"

      # 5. Push the Zip to AWS Lambda
      - name: Deploy to AWS Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws lambda update-function-code \
            --function-name DrDecideBackend \
            --zip-file fileb://deployment_package.zip