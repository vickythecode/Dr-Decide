name: Deploy FastAPI to AWS Lambda

# This tells GitHub to run the script every time you push to the 'main' branch
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python (Match this to your Lambda's Python version)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies directly into the current folder
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t .

      # 4. Zip everything up (excluding git files to save space)
      - name: Create Zip Archive
        run: |
          zip -r9 deployment_package.zip . -x "*.git*" ".github/*"

      # 5. Push the Zip to AWS Lambda
      - name: Deploy to AWS Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws lambda update-function-code \
            --function-name DrDecideBackend \
            --zip-file fileb://deployment_package.zip